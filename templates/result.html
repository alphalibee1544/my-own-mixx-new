<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixxByYas - Matokeo</title>
    <style>
        :root { --primary: #2563eb; --gold: #f59e0b; --gold-dark: #d97706; --light-yellow: #fffef5; --success: #10b981; --danger: #ef4444; --dark: #1e293b; --gray: #64748b; --white: #ffffff; --light-navy: #2c3e6b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light-yellow); color: var(--dark); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .brand-bar { background: var(--light-navy); text-align: center; padding: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; border-bottom: 2px solid var(--gold); }
        .brand-logo { width: 32px; height: 32px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; color: var(--light-navy); }
        .brand-text { font-size: 1.1rem; font-weight: 700; } .brand-text .mixx { color: var(--white); } .brand-text .yas { color: var(--gold); }
        .main-container { max-width: 500px; margin: 0 auto 2rem; padding: 0 1rem; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 60vh; }
        .card { background: var(--white); border-radius: 14px; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid #fef3c7; text-align: center; width: 100%; }
        .icon { width: 80px; height: 80px; margin: 0 auto 1rem; }
        .icon svg { width: 100%; height: 100%; }
        .success-circle { stroke: var(--success); stroke-width: 3; fill: none; stroke-dasharray: 283; stroke-dashoffset: 283; animation: drawCircle 1s ease forwards; }
        .success-check { stroke: var(--success); stroke-width: 3; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.5s 0.6s ease forwards; }
        .fail-circle { stroke: var(--danger); stroke-width: 3; fill: none; stroke-dasharray: 283; stroke-dashoffset: 283; animation: drawCircle 1s ease forwards; }
        .fail-x1 { stroke: var(--danger); stroke-width: 3; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.5s 0.6s ease forwards; }
        .fail-x2 { stroke: var(--danger); stroke-width: 3; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.5s 0.8s ease forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }
        h2 { margin-bottom: 0.5rem; }
        .amount { font-size: 2rem; font-weight: 900; color: var(--primary); margin: 0.5rem 0; }
        .sub-text { color: var(--gray); margin-bottom: 1.5rem; }
        .btn { display: inline-block; background: var(--gold); color: var(--dark); padding: 0.8rem 2rem; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; font-size: 0.9rem; text-decoration: none; }
        .btn:hover { background: var(--gold-dark); }
        .copyright-bar { background: var(--light-navy); text-align: center; padding: 1rem; margin-top: auto; }
        .copyright-bar p { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
        .approved { color: var(--success); }
        .rejected { color: var(--danger); }
    </style>
</head>
<body>
    <div class="brand-bar"><div class="brand-logo">M</div><div class="brand-text"><span class="mixx">Mixx</span><span class="yas">ByYas</span></div></div>
    <div class="main-container">
        <div class="card" id="resultCard">
            <!-- Content will be injected by JavaScript -->
        </div>
    </div>
    <div class="copyright-bar"><p>© 2024 MixxByYas</p></div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var status = urlParams.get('status') || 'rejected';
        var amount = parseInt(urlParams.get('amount') || '0');

        var card = document.getElementById('resultCard');

        if (status === 'approved') {
            card.innerHTML = `
                <div class="icon">
                    <svg viewBox="0 0 100 100">
                        <circle class="success-circle" cx="50" cy="50" r="45"/>
                        <path class="success-check" d="M30 50 L45 65 L70 35" fill="none"/>
                    </svg>
                </div>
                <h2 class="approved">🎉 Mkopo Umeidhinishwa!</h2>
                <div class="amount">TZS ${amount.toLocaleString()}</div>
                <p class="sub-text">📱 Uthibitisho umetumwa<br>💰 Fedha zitaingia hivi karibuni</p>
                <a href="/" class="btn">🏠 Rudi Nyumbani</a>
            `;
        } else {
            card.innerHTML = `
                <div class="icon">
                    <svg viewBox="0 0 100 100">
                        <circle class="fail-circle" cx="50" cy="50" r="45"/>
                        <line class="fail-x1" x1="35" y1="35" x2="65" y2="65" stroke="#ef4444" stroke-width="3"/>
                        <line class="fail-x2" x1="65" y1="35" x2="35" y2="65" stroke="#ef4444" stroke-width="3"/>
                    </svg>
                </div>
                <h2 class="rejected">❌ Mkopo Umekataliwa</h2>
                <p class="sub-text">Samahani, mkopo wako haukuidhinishwa.<br>Jaribu tena baadae.</p>
                <a href="/apply" class="btn">🔄 Jaribu Tena</a>
            `;
        }
    </script>
</body>
</html>
